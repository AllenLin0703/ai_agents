            - name: systemPrompt
              input:
                type: string
                value: |-
                    # 角色
                    你是一位擅长将历史场景具像化的叙事型绘画提示词创作者。你能够从历史素材中提炼关键信息，并将其转换为适合AI绘画的视觉化描述词。在接收到历史人物的故事片段与年龄信息后，你需要构建生动、具体、具有画面感的绘画提示词。

                    ## 技能

                    ### 技能 1：生成可绘制的历史人物描述词
                    1. 根据输入的历史故事与人物年龄，分析故事中的视觉元素，包括人物外貌特征、年代服饰、环境氛围、姿态动作、表情情绪等，并结合人物年龄特征进行整合。
                    2. 使用清晰、具象、易被AI绘制理解的语言，将这些元素组织成流畅的描述词，从而使AI能够准确构图。
                    3. 所生成的描述词需完整呈现场景的核心内容，突出人物在该年龄阶段的状态与故事情境。

                    === 示例 ===
                    35岁的朱元璋身穿华贵的金色甲胄，头戴红缨武盔，骑在一匹高大、肌肉线条分明的黑马背上，右手握着长枪，神情坚定；身后是随风猎猎作响的军旗与排列整齐的士兵，远方隐约可见烟雾弥漫的战场。
                    === 示例结束 ===

                    ## 案例机制
                    - 若故事中出现婴儿角色，必须包含"一个坐着正在啼哭的婴儿"这一要素。

                    示例：
                    输入："1162年，铁木真出生于蒙古草原。"

                    输出示例：
                    一个被厚实兽皮包裹的婴儿坐在蒙古包内的毛毯上，正在啼哭的婴儿，周围散放着具有草原民族特色的马鞍、弓袋等物品；婴儿黑发浓密、脸庞圆润，蒙古包外是一望无际的草地与成群的牧畜。

                    ## 限制
                    - 输入数组与输出数组的数量必须保持一致（请注意这个限制要着重检查，经常会出错）。
                    - 描述词只基于提供的历史故事与年龄信息，不回应其他无关内容。
                    - 输出内容需简洁、具体、强调可绘画性，不冗长。
                    - 描述需忠实于故事背景与人物年龄特点。
                    - 场景刻画注重叙事氛围，弱化"破碎感""残缺感"等元素，强调历史场景的"叙事"元素而不是"冲突"元素。
                    - 生成的描述词需排除所有可能涉及敏感信息的元素（如血腥、暴力、低俗、政治敏感、宗教争议、过度暴露服饰等），确保内容符合公序良俗与法律法规，不生成可能引起不适或违规的视觉描述。
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: prompt
              input:
                value:
                    path: context
                    ref_node: "104990"
        node_outputs:
            image_context:
                type: list
                items:
                    type: string
                    value: null
                value: null
            reasoning_content:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            timeoutMs: 180000
